version: '3.8'

name: fluxocaixa
services:
  # ───────────────────────────── Infrastructure ──────────────────────────────

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - fluxocaixa-network
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2181"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
    networks:
      - fluxocaixa-network
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 15s
      timeout: 10s
      retries: 10

  redis:
    image: redis:7.2-alpine
    container_name: redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    networks:
      - fluxocaixa-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ──────────────────────────── Backend Services ─────────────────────────────

  api-lancamentos:
    build:
      context: ./src/backend
      dockerfile: FluxoCaixa.API.Lancamentos/Dockerfile
    container_name: api-lancamentos
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Redis=redis:6379
      - Kafka__BootstrapServers=kafka:9092
      - Jwt__Key=${JWT_SECRET_KEY:-SuperSecretKey_Change_In_Production_2024!}
      - Jwt__Issuer=FluxoCaixa.API.Lancamentos
      - Jwt__Audience=FluxoCaixa.Clients
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fluxocaixa-network
    restart: on-failure

  api-consolidado:
    build:
      context: ./src/backend
      dockerfile: FluxoCaixa.API.Consolidado/Dockerfile
    container_name: api-consolidado
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Redis=redis:6379
      - Kafka__BootstrapServers=kafka:9092
      - Jwt__Key=${JWT_SECRET_KEY:-SuperSecretKey_Change_In_Production_2024!}
      - Jwt__Issuer=FluxoCaixa.API.Lancamentos
      - Jwt__Audience=FluxoCaixa.Clients
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fluxocaixa-network
    restart: on-failure

  # ─────────────────────────── Frontend Service ──────────────────────────────

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "4200:80"
    environment:
      - API_LANCAMENTOS_URL=http://localhost:5001
      - API_CONSOLIDADO_URL=http://localhost:5002
    depends_on:
      - api-lancamentos
      - api-consolidado
    networks:
      - fluxocaixa-network

networks:
  fluxocaixa-network:
    driver: bridge
